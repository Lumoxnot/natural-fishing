<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Natural Fishing</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <div id="loading-overlay" class="oculto">
    <div class="spinner"></div>
    <p>Autenticando...</p>
  </div>

  <div id="toast-container"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="icone">🎣</div>
        <h1>Natural Fishing</h1>
        <p>Acesse sua conta</p>
      </div>

      <form id="form-login" novalidate>
        <div class="form-grupo">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu_email@exemplo.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-grupo">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-primario" id="btn-login">
          Entrar
        </button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:#888;">
        Não tem uma conta? <a href="../cadastro.html" style="color:#2e86c1;">Cadastre-se aqui</a>
      </p>
      <p style="text-align:center; margin-top:10px; font-size:0.82rem; color:#888;">
        <a href="/" style="color:#2e86c1;">← Voltar à loja</a>
      </p>
    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
