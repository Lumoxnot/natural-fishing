<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro — Natural Fishing</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div id="loading-overlay" class="oculto">
    <div class="spinner"></div>
    <p>Cadastrando...</p>
  </div>

  <div id="toast-container"></div>

  <div class="cadastro-page">
    <div class="cadastro-card" style="max-width:580px;">
      <div class="cadastro-logo">
        <div class="icone">🎣</div>
        <h1>Natural Fishing</h1>
        <p>Crie sua conta para comprar</p>
      </div>

      <form id="form-cadastro" novalidate>
        <div class="grid-cadastro">

          <div class="form-grupo span-2">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" placeholder="Seu nome completo" required/>
          </div>

          <div class="form-grupo">
            <label for="email">E-mail *</label>
            <input type="email" id="email" placeholder="seu@email.com" required/>
          </div>

          <div class="form-grupo">
            <label for="telefone">Telefone *</label>
            <input type="tel" id="telefone" placeholder="(12) 99999-9999" required maxlength="15"/>
          </div>

          <div class="form-grupo">
            <label for="data_nascimento">Data de nascimento *</label>
            <input type="date" id="data_nascimento" required/>
            <small style="color:#888;font-size:0.72rem;">Você deve ter 18 anos ou mais.</small>
          </div>

          <div class="form-grupo">
            <label for="cep">CEP *</label>
            <div class="campo-cep-wrapper">
              <input
                type="text"
                id="cep"
                placeholder="00000-000"
                required
                maxlength="9"
              />
              <button type="button" class="btn-buscar-cep" id="btn-buscar-cep">Buscar</button>
            </div>
            <div class="cidade-estado-preview" id="cep-preview"></div>
          </div>

          <div class="form-grupo span-2">
            <label for="endereco">Endereço (rua/avenida) *</label>
            <input type="text" id="endereco" placeholder="Rua das Garoupas" required/>
          </div>

          <div class="form-grupo">
            <label for="numero_casa">Número *</label>
            <input type="text" id="numero_casa" placeholder="123" required/>
          </div>

          <div class="form-grupo">
            <label for="cidade">Cidade *</label>
            <input type="text" id="cidade" placeholder="Caraguatatuba" required readonly/>
          </div>

          <div class="form-grupo">
            <label for="estado">Estado *</label>
            <input type="text" id="estado" placeholder="SP" required readonly maxlength="2"/>
          </div>

          <div class="form-grupo">
            <label for="senha">Senha *</label>
            <input type="password" id="senha" placeholder="Min. 6 caracteres"
              required minlength="6" autocomplete="new-password"/>
          </div>

          <div class="form-grupo">
            <label for="confirmar-senha">Confirmar senha *</label>
            <input type="password" id="confirmar-senha" placeholder="Repita a senha"
              required minlength="6" autocomplete="new-password"/>
          </div>

        </div>

        <button type="submit" class="btn-primario" id="btn-cadastro" style="margin-top:20px;">
          Criar conta
        </button>
      </form>

      <p style="text-align:center;margin-top:18px;font-size:0.85rem;color:#888;">
        Já tem conta? <a href="admin/login.html" style="color:#2e86c1;">Faça login</a>
      </p>
      <p style="text-align:center;margin-top:8px;font-size:0.82rem;">
        <a href="index.html" style="color:#2e86c1;">← Voltar à loja</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
