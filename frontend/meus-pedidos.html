<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meus Pedidos — Natural Fishing</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Carregando pedidos...</p>
  </div>

  <div id="toast-container"></div>

  <header>
    <nav class="navbar">
      <a href="index.html" class="logo">
        <span class="logo-icon">🎣</span>
        Natural <span>Fishing</span>
      </a>

      <!-- DESKTOP NAV -->
      <ul class="nav-links">
        <li><a href="index.html">Loja</a></li>
        <li><a href="meus-pedidos.html" class="ativo">Meus Pedidos</a></li>
        <li><a href="favoritos.html">Favoritos</a></li>
      </ul>

      <!-- DESKTOP AUTH -->
      <div class="nav-actions desktop-only">
        <div id="nav-auth"></div>
      </div>

      <!-- MOBILE ACTIONS -->
      <div class="mobile-actions">
        <button class="btn-hamburger" id="btn-hamburger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <!-- MOBILE MENU OVERLAY -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>

    <!-- MOBILE MENU -->
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-header">
        <span class="logo-mobile">🎣 Natural Fishing</span>
        <button class="btn-fechar-menu" id="btn-fechar-menu" aria-label="Fechar menu">✕</button>
      </div>
      <div class="mobile-menu-body" id="mobile-menu-body">
        <!-- Preenchido via JS -->
      </div>
    </div>
  </header>

  <div class="area-usuario">
    <div class="usuario-container">
      <h1 class="pagina-titulo">📦 Meus Pedidos</h1>
      <div id="lista-pedidos">
        <!-- Preenchido via JS -->
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
