<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalhes do Produto — Natural Fishing</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Carregando produto...</p>
  </div>

  <div id="toast-container"></div>

  <header>
    <nav class="navbar">
      <a href="/" class="logo">
        <span class="logo-icon">🎣</span>
        Natural <span>Fishing</span>
      </a>

      <!-- DESKTOP NAV -->
      <ul class="nav-links">
        <li><a href="/">Loja</a></li>
        <li><a href="/pedidos">Meus Pedidos</a></li>
        <li><a href="/favoritos">Favoritos</a></li>
      </ul>

      <!-- DESKTOP AUTH -->
      <div class="nav-actions desktop-only">
        <div id="nav-auth"></div>
        <button class="btn-carrinho" id="btn-abrir-carrinho" aria-label="Abrir carrinho">
          🛒 <span class="badge-carrinho" id="badge-carrinho">0</span>
        </button>
      </div>

      <!-- MOBILE ACTIONS -->
      <div class="mobile-actions">
        <button class="btn-carrinho-mobile" id="btn-abrir-carrinho-mobile" aria-label="Carrinho">
          🛒
          <span class="badge-carrinho" id="badge-carrinho-mobile">0</span>
        </button>
        <button class="btn-hamburger" id="btn-hamburger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <!-- MOBILE MENU OVERLAY -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>

    <!-- MOBILE MENU -->
    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-header">
        <span class="logo-mobile">🎣 Natural Fishing</span>
        <button class="btn-fechar-menu" id="btn-fechar-menu" aria-label="Fechar menu">✕</button>
      </div>
      <div class="mobile-menu-body" id="mobile-menu-body">
        <!-- Preenchido via JS com base no estado de login -->
      </div>
    </div>
  </header>

  <main class="container-detalhe">
    <div id="detalhe-container">
      <!-- Detalhes do produto e avaliações serão carregados aqui via JS -->
    </div>
  </main>

  <footer>
    &copy; 2024 Natural Fishing. Todos os direitos reservados.
  </footer>

  <!-- Sidebar Carrinho -->
  <div class="overlay-carrinho" id="overlay-carrinho"></div>
  <div class="sidebar-carrinho" id="sidebar-carrinho">
    <div class="carrinho-header">
      <h2>🛒 Seu Carrinho</h2>
      <button class="btn-fechar-carrinho" id="btn-fechar-carrinho" aria-label="Fechar carrinho">✕</button>
    </div>
    <div class="carrinho-itens" id="carrinho-itens">
      <!-- Itens do carrinho serão carregados aqui via JS -->
    </div>
    <div class="carrinho-footer" id="carrinho-footer">
      <!-- Resumo e botão de finalizar serão carregados aqui via JS -->
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
